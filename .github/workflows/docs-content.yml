name: Docs content

on:
  push:
    branches:
      - 'docs/**'
    paths:
      - 'docs/**'
      - 'scripts/check-docs-content.mjs'
      - '.github/workflows/docs-content.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/check-docs-content.mjs'
      - '.github/workflows/docs-content.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check portable documentation
        run: node scripts/check-docs-content.mjs --root docs --expected-docs 19 --expected-nav 5
